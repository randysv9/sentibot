<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentibot - Mood Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom CSS (Flask static path) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<!-- ... (head section remains unchanged) ... -->

<body>

<!-- Main Content Section -->
<div class="container py-4">

  <!-- Login Section (now part of page layout) -->
  <div id="login-section" class="login-container mb-4">
    <h2>Login</h2>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p id="login-error" style="color: red;"></p>
  </div>

  <!-- App Section -->
  <div id="app-section" style="display: none;">
    <button id="logout-btn" style="float:right;">Logout</button>
    <h2>Welcome, <span id="user-display"></span>!</h2>
  </div>

  <!-- User Labels -->
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="fw-bold">👤 Randy Villanueva</div>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-2">
    <div class="fw-bold">💬 Mary Macaraeg</div>
  </div>

  <!-- Header -->
  <div class="text-center mb-4">
    <h1 class="fw-bold">🤖 Sentibot</h1>
    <p class="text-muted">Your AI Buddy for Mood Support 💖</p>
  </div>

  <!-- Mood History Panel -->
  <div class="card mb-3 shadow-sm">
    <div class="card-header bg-info text-white">🧠 Recent Mood History</div>
    <div id="mood-history" class="card-body" style="max-height: 200px; overflow-y: auto;">
      <p class="text-muted">No history yet.</p>
    </div>
    <div class="card-footer text-end">
      <button id="clear-history-btn" class="btn btn-sm btn-danger" aria-label="Clear Mood History">
        <i class="fas fa-trash-alt"></i> Clear History
      </button>
    </div>
  </div>

  <!-- Mood Chart Panel -->
  <div class="card mb-3 shadow-sm">
    <div class="card-header bg-secondary text-white">📊 Mood Chart</div>
    <div class="card-body">
      <canvas id="moodChart" width="400" height="200" aria-label="Mood Chart"></canvas>
    </div>
  </div>

  <!-- Mood Summary Panel -->
  <div class="card mb-3 shadow-sm">
    <div class="card-header bg-success text-white">📌 Mood Summary</div>
    <div id="mood-summary" class="card-body">
      <p class="text-muted">No summary available yet.</p>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="card mb-3 shadow-sm">
    <div class="card-header bg-primary text-white">💬 Chat</div>
    <div id="chat-box" class="card-body" style="height: 300px; overflow-y: auto;" aria-live="polite"></div>
  </div>

  <!-- Chat Form -->
  <form id="chat-form" class="d-flex gap-2" autocomplete="off">
    <select id="mood-select" class="form-select" aria-label="Select your mood">
      <option value="" selected disabled>Choose your mood</option>
      <option value="Excited 🤩">Excited 🤩</option>
      <option value="Happy 😊">Happy 😊</option>
      <option value="Relaxed 😎">Relaxed 😎</option>
      <option value="Neutral 😐">Neutral 😐</option>
      <option value="Sad 😢">Sad 😢</option>
      <option value="Anxious 😨">Anxious 😨</option>
      <option value="Angry 😠">Angry 😠</option>
      <option value="Other">Other</option>
    </select>
    <input type="text" id="user-input" class="form-control" placeholder="Type your message..." required>
    <button type="submit" class="btn btn-primary" aria-label="Send Message">
      <i class="fas fa-paper-plane"></i> Send
    </button>
  </form>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

<!-- Updated CSS -->
<style>
  .login-container {
    position: relative;
    padding: 20px;
    background-color: white;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    z-index: 1;
    font-size: 16px;
  }

  .login-container h2 {
    font-size: 1.5rem;
  }

  .login-container input,
  .login-container button {
    font-size: 16px;
  }

  .login-container form {
    display: flex;
    flex-direction: column;
  }

  .login-container button {
    margin-top: 10px;
  }
</style>

</body>
</html>
