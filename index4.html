<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentibot - Mood Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <div class="container py-4">
    <div class="text-center mb-4">
      <h1 class="fw-bold">🤖 Sentibot</h1>
      <p class="text-muted">Your AI Buddy for Mood Support 💖</p>
    </div>

    <!-- Mood History Panel -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-info text-white">🧠 Recent Mood History</div>
      <div id="mood-history" class="card-body" style="max-height: 200px; overflow-y: auto;">
        <p class="text-muted">No history yet.</p>
      </div>
    </div>

    <!-- Mood Chart -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-secondary text-white">📊 Mood Chart</div>
      <div class="card-body">
        <canvas id="moodChart" width="400" height="200"></canvas>
      </div>
    </div>

    <!-- Chat Interface -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-primary text-white">Chat</div>
      <div id="chat-box" class="card-body" style="height: 300px; overflow-y: auto;"></div>
    </div>

    <form id="chat-form" class="d-flex gap-2">
      <input type="text" id="user-input" class="form-control" placeholder="Type your message..." required>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-paper-plane"></i> Send
      </button>
    </form>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="static/script.js"></script>
</body>
</html>
